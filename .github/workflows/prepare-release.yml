name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 6.3.0 without v prefix)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-${{ inputs.version }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: "📝 Prepare Release"
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Extract module config
        id: config
        run: |
          MODULE="analytics"
          MODULE_CONFIG=$(jq -e '.analytics' .github/modules.json)

          if [ -z "$MODULE_CONFIG" ] || [ "$MODULE_CONFIG" = "null" ]; then
            echo "ERROR: Module 'analytics' not found in .github/modules.json"
            exit 1
          fi

          echo "podspec=$(echo "$MODULE_CONFIG" | jq -r '.podspec')" >> $GITHUB_OUTPUT
          echo "version_files=$(echo "$MODULE_CONFIG" | jq -c '.version_files // []')" >> $GITHUB_OUTPUT
          echo "changelog=$(echo "$MODULE_CONFIG" | jq -r '.changelog')" >> $GITHUB_OUTPUT

          echo "✓ Module config loaded for: analytics"

      - name: Check if PR already exists
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --head release/${{ inputs.version }} --json number --jq 'length')
          echo "PR_EXISTS=$PR_EXISTS" >> $GITHUB_OUTPUT

      - name: Checkout existing release branch
        if: ${{ steps.check_pr.outputs.PR_EXISTS != '0' }}
        run: |
          git fetch origin release/${{ inputs.version }}
          git checkout release/${{ inputs.version }}

      - name: Create release branch
        if: ${{ steps.check_pr.outputs.PR_EXISTS == '0' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release/${{ inputs.version }}

      - name: Get current version
        if: ${{ steps.check_pr.outputs.PR_EXISTS == '0' }}
        id: current_version
        run: |
          CURRENT_VERSION=$(grep -E 'return "[0-9]+\.[0-9]+\.[0-9]+"' Sources/AutomaticProperties.swift | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Update version in files
        if: ${{ steps.check_pr.outputs.PR_EXISTS == '0' }}
        run: |
          OLD_VERSION="${{ steps.current_version.outputs.CURRENT_VERSION }}"
          NEW_VERSION="${{ inputs.version }}"

          # Update podspec (primary version source)
          PODSPEC="${{ steps.config.outputs.podspec }}"
          sed -i '' "s/s.version = '$OLD_VERSION'/s.version = '$NEW_VERSION'/" "$PODSPEC"
          echo "✓ Updated version in $PODSPEC"

          # Update each version file from JSON config
          echo '${{ steps.config.outputs.version_files }}' | jq -r '.[]' | while read -r FILE; do
            if [ -f "$FILE" ]; then
              sed -i '' "s/$OLD_VERSION/$NEW_VERSION/g" "$FILE"
              echo "✓ Updated version in $FILE"
            else
              echo "⚠️  Version file not found: $FILE"
            fi
          done

      - name: Generate documentation
        if: ${{ steps.check_pr.outputs.PR_EXISTS == '0' }}
        run: |
          # Install jazzy
          gem install jazzy

          # Generate docs
          ./scripts/generate_docs.sh

      - name: Generate changelog
        if: ${{ steps.check_pr.outputs.PR_EXISTS == '0' }}
        run: |
          NEW_VERSION="${{ inputs.version }}"

          echo "Generating changelog for version $NEW_VERSION..."

          # Generate new changelog entry
          ./scripts/generate-changelog.sh "$NEW_VERSION" "mixpanel/mixpanel-swift" > /tmp/new-changelog.md

          # Prepend to existing CHANGELOG.md or create new one
          CHANGELOG_PATH="${{ steps.config.outputs.changelog }}"
          if [ -f "$CHANGELOG_PATH" ]; then
            # Backup existing changelog
            cp "$CHANGELOG_PATH" /tmp/existing-changelog.md
            # Prepend new entry
            cat /tmp/new-changelog.md > "$CHANGELOG_PATH"
            cat /tmp/existing-changelog.md >> "$CHANGELOG_PATH"
          else
            # Create new CHANGELOG.md
            echo "# Changelog" > "$CHANGELOG_PATH"
            echo "" >> "$CHANGELOG_PATH"
            cat /tmp/new-changelog.md >> "$CHANGELOG_PATH"
          fi

          echo "✓ Changelog generated"

      - name: Commit and push changes
        if: ${{ steps.check_pr.outputs.PR_EXISTS == '0' }}
        run: |
          # Add all modified version files
          git add "${{ steps.config.outputs.podspec }}"
          echo '${{ steps.config.outputs.version_files }}' | jq -r '.[]' | xargs git add
          git add "${{ steps.config.outputs.changelog }}"
          git add docs  # Generated documentation

          git commit \
            -m "release: prepare ${{ inputs.version }}" \
            -m "- Updated version to ${{ inputs.version }}
          - Updated documentation
          - Updated changelog"

          git push origin release/${{ inputs.version }}

      - name: Create pull request
        if: ${{ steps.check_pr.outputs.PR_EXISTS == '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "release: prepare ${{ inputs.version }}" \
            --body "## Release ${{ inputs.version }}

          This PR prepares the release for version ${{ inputs.version }}.

          ### Changes
          - Updated version in Mixpanel-swift.podspec
          - Updated version in Info.plist
          - Updated version in Sources/AutomaticProperties.swift
          - Updated version in scripts/generate_docs.sh
          - Regenerated documentation
          - Updated CHANGELOG.md with commits since last release

          ### Changelog
          The changelog has been auto-generated from conventional commit messages.
          Please review and edit if needed before merging.

          ### Next Steps
          1. Review the changes (especially the changelog)
          2. Approve and merge this PR
          3. Run the \`Release SPM\` workflow from master branch with version \`${{ inputs.version }}\`

          ---
          *Created by GitHub Actions workflow*" \
            --base master \
            --head release/${{ inputs.version }}

      - name: PR created successfully
        run: |
          echo "✅ Release PR prepared successfully!"
          echo ""
          echo "Next steps:"
          echo "1. Review and approve the PR: https://github.com/${{ github.repository }}/pull/$(gh pr list --head release/${{ inputs.version }} --json number --jq '.[0].number')"
          echo "2. Merge the PR to master"
          echo "3. Run 'Release SPM' workflow from master branch"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
