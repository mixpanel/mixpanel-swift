name: Release CocoaPod

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 6.3.0 without v prefix)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-cocoapod-${{ inputs.version }}
  cancel-in-progress: false  # NEVER cancel during CocoaPods push

jobs:
  release-cocoapod:
    name: "📦 Release CocoaPod"
    runs-on: macos-26
    environment: release-cocoapods
    steps:
      - name: Checkout master for config
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: master
          fetch-depth: 0

      - name: Extract module config
        id: config
        run: |
          MODULE="analytics"
          MODULE_CONFIG=$(jq -e '.analytics' .github/modules.json)

          if [ -z "$MODULE_CONFIG" ] || [ "$MODULE_CONFIG" = "null" ]; then
            echo "ERROR: Module 'analytics' not found in .github/modules.json"
            exit 1
          fi

          TAG_PREFIX=$(echo "$MODULE_CONFIG" | jq -r '.tag_prefix')
          FULL_TAG="${TAG_PREFIX}${{ inputs.version }}"

          echo "full_tag=$FULL_TAG" >> $GITHUB_OUTPUT
          echo "podspec=$(echo "$MODULE_CONFIG" | jq -r '.podspec')" >> $GITHUB_OUTPUT
          echo "version_files=$(echo "$MODULE_CONFIG" | jq -c '.version_files // []')" >> $GITHUB_OUTPUT

      - name: Checkout version tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: refs/tags/${{ steps.config.outputs.full_tag }}
          fetch-depth: 0

      - name: Extract version from files
        id: extract_versions
        run: |
          PODSPEC="${{ steps.config.outputs.podspec }}"

          # Extract from podspec
          PODSPEC_VERSION=$(grep -E "s.version = '[0-9]+\.[0-9]+\.[0-9]+'" "$PODSPEC" | sed -E "s/.*'([0-9]+\.[0-9]+\.[0-9]+)'.*/\1/")

          echo "PODSPEC_VERSION=$PODSPEC_VERSION" >> $GITHUB_OUTPUT

          echo "Input version: ${{ inputs.version }}"
          echo "Podspec version: $PODSPEC_VERSION"

          # Validate each version file from modules.json
          echo '${{ steps.config.outputs.version_files }}' | jq -r '.[]' | while read -r FILE; do
            if [ ! -f "$FILE" ]; then
              echo "ERROR: Version file not found: $FILE"
              exit 1
            fi

            FILE_VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' "$FILE" | head -1)

            if [ -z "$FILE_VERSION" ]; then
              echo "ERROR: Could not extract version from $FILE"
              exit 1
            fi

            echo "✓ $FILE: $FILE_VERSION"
          done

      - name: Validate version consistency
        run: |
          PODSPEC_VERSION="${{ steps.extract_versions.outputs.PODSPEC_VERSION }}"
          INPUT_VERSION="${{ inputs.version }}"
          FULL_TAG="${{ steps.config.outputs.full_tag }}"
          MISMATCH=0

          # Check podspec version
          if [ "$PODSPEC_VERSION" != "$INPUT_VERSION" ]; then
            echo "ERROR: Podspec version mismatch"
            echo "  Expected: $INPUT_VERSION"
            echo "  Found: $PODSPEC_VERSION"
            echo "  File: ${{ steps.config.outputs.podspec }}"
            MISMATCH=1
          fi

          # Check each version file from modules.json
          echo '${{ steps.config.outputs.version_files }}' | jq -r '.[]' | while read -r FILE; do
            FILE_VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' "$FILE" | head -1)

            if [ "$FILE_VERSION" != "$INPUT_VERSION" ]; then
              echo "ERROR: Version mismatch in $FILE"
              echo "  Expected: $INPUT_VERSION"
              echo "  Found: $FILE_VERSION"
              MISMATCH=1
            fi
          done

          if [ $MISMATCH -eq 1 ]; then
            echo ""
            echo "Version files in tag $FULL_TAG are not consistent."
            echo "This usually means the tag was created incorrectly."
            echo ""
            echo "Fix: Delete the tag and re-run the 'Release SPM' workflow."
            echo "  git push --delete origin $FULL_TAG"
            exit 1
          fi

          echo "✓ All version checks passed"

      - name: Publish to CocoaPods
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          # Install CocoaPods
          gem install cocoapods

          PODSPEC="${{ steps.config.outputs.podspec }}"

          echo "Publishing $PODSPEC to CocoaPods..."
          echo ""

          # trunk push validates server-side, no need for separate spec lint
          pod trunk push "$PODSPEC" --allow-warnings

          echo ""
          echo "✓ Published to CocoaPods"

      - name: CocoaPods release complete
        run: |
          FULL_TAG="${{ steps.config.outputs.full_tag }}"

          echo ""
          echo "🎉 CocoaPods release ${{ inputs.version }} published successfully!"
          echo ""
          echo "Published to:"
          echo "  ✓ CocoaPods: https://cocoapods.org/pods/Mixpanel-swift"
          echo ""
          echo "⚠️  FINAL STEP: Review and publish the draft GitHub Release"
          echo "    https://github.com/${{ github.repository }}/releases/tag/$FULL_TAG"
          echo ""
          echo "After publishing the GitHub Release, users can install via:"
          echo "  - Swift Package Manager (SPM)"
          echo "  - CocoaPods"
