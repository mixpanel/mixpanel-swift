name: Publish Release Artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g., 6.3.0 without v prefix)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-publish-${{ inputs.tag }}
  cancel-in-progress: false  # NEVER cancel during CocoaPods push

jobs:
  publish:
    name: "📦 Publish Release"
    runs-on: macos-26
    environment: production
    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0

      - name: Publish to CocoaPods
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          # Install CocoaPods
          gem install cocoapods

          echo "Publishing to CocoaPods..."
          echo ""

          # trunk push validates server-side, no need for separate spec lint
          pod trunk push Mixpanel-swift.podspec --allow-warnings

          echo ""
          echo "✓ Published to CocoaPods"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating GitHub Release draft..."
          gh release create "${{ inputs.tag }}" \
            --title "Release ${{ inputs.tag }}" \
            --generate-notes \
            --draft

          echo "✓ GitHub Release created as draft"

      - name: Release complete
        run: |
          echo ""
          echo "🎉 Release ${{ inputs.tag }} prepared successfully!"
          echo ""
          echo "Artifacts published:"
          echo "  ✓ CocoaPods: https://cocoapods.org/pods/Mixpanel-swift"
          echo "  ✓ GitHub Release: Created as DRAFT"
          echo ""
          echo "⚠️  NEXT STEP: Review and publish the draft release"
          echo "    https://github.com/${{ github.repository }}/releases/tag/${{ inputs.tag }}"
          echo ""
          echo "After publishing, users can install via:"
          echo "  - Swift Package Manager (SPM)"
          echo "  - CocoaPods"
