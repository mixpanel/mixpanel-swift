name: Release SPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 6.3.0 without v prefix)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-spm-${{ inputs.version }}
  cancel-in-progress: false  # Never cancel during release

jobs:
  release-spm:
    name: "📦 Release SPM"
    runs-on: macos-26
    environment: release-tagging
    steps:
      - name: Enforce master branch requirement
        run: |
          if [ "${{ github.ref }}" != "refs/heads/master" ]; then
            echo "ERROR: This workflow can only run from master branch"
            echo "Current ref: ${{ github.ref }}"
            echo ""
            echo "To fix: Navigate to Actions → Release SPM"
            echo "        Click the branch dropdown and select 'master'"
            echo "        Then run the workflow"
            exit 1
          fi
          echo "✓ Running from master branch"

      - name: Checkout master
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: master
          fetch-depth: 0

      - name: Extract version from files
        id: extract_versions
        run: |
          # Extract from podspec
          PODSPEC_VERSION_LINE=$(grep -E "s.version = '[0-9]+\.[0-9]+\.[0-9]+'" Mixpanel-swift.podspec || true)
          if [ -z "$PODSPEC_VERSION_LINE" ]; then
            echo "ERROR: Could not extract version from Mixpanel-swift.podspec"
            exit 1
          fi
          PODSPEC_VERSION=$(printf '%s\n' "$PODSPEC_VERSION_LINE" | sed -E "s/.*'([0-9]+\.[0-9]+\.[0-9]+)'.*/\1/")
          if [ -z "$PODSPEC_VERSION" ]; then
            echo "ERROR: Could not parse version from Mixpanel-swift.podspec"
            exit 1
          fi

          # Extract from AutomaticProperties.swift
          SWIFT_VERSION_LINE=$(grep -E 'return "[0-9]+\.[0-9]+\.[0-9]+"' Sources/AutomaticProperties.swift || true)
          if [ -z "$SWIFT_VERSION_LINE" ]; then
            echo "ERROR: Could not extract version from Sources/AutomaticProperties.swift"
            exit 1
          fi
          SWIFT_VERSION=$(printf '%s\n' "$SWIFT_VERSION_LINE" | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          if [ -z "$SWIFT_VERSION" ]; then
            echo "ERROR: Could not parse version from Sources/AutomaticProperties.swift"
            exit 1
          fi

          echo "PODSPEC_VERSION=$PODSPEC_VERSION" >> $GITHUB_OUTPUT
          echo "SWIFT_VERSION=$SWIFT_VERSION" >> $GITHUB_OUTPUT

          echo "Input version: ${{ inputs.version }}"
          echo "Podspec version: $PODSPEC_VERSION"
          echo "Swift version: $SWIFT_VERSION"

      - name: Validate version consistency
        run: |
          PODSPEC_VERSION="${{ steps.extract_versions.outputs.PODSPEC_VERSION }}"
          SWIFT_VERSION="${{ steps.extract_versions.outputs.SWIFT_VERSION }}"
          INPUT_VERSION="${{ inputs.version }}"
          MISMATCH=0

          if [ "$PODSPEC_VERSION" != "$INPUT_VERSION" ]; then
            echo "ERROR: Podspec version mismatch"
            echo "  Expected: $INPUT_VERSION"
            echo "  Found: $PODSPEC_VERSION"
            echo "  File: Mixpanel-swift.podspec"
            MISMATCH=1
          fi

          if [ "$SWIFT_VERSION" != "$INPUT_VERSION" ]; then
            echo "ERROR: AutomaticProperties.swift version mismatch"
            echo "  Expected: $INPUT_VERSION"
            echo "  Found: $SWIFT_VERSION"
            echo "  File: Sources/AutomaticProperties.swift"
            MISMATCH=1
          fi

          if [ $MISMATCH -eq 1 ]; then
            echo ""
            echo "Version files are not consistent with input version."
            echo "This usually means:"
            echo "  1. The release PR was not merged yet, or"
            echo "  2. The release PR merge had conflicts that weren't resolved correctly"
            echo ""
            echo "Fix: Run the 'Prepare Release' workflow and merge the PR first."
            exit 1
          fi

          echo "✓ All version checks passed"

      - name: Verify tag does not exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ inputs.version }}$"; then
            echo "ERROR: Tag ${{ inputs.version }} already exists on origin"
            echo ""
            echo "If you need to re-release, use a patch version increment."
            echo "Tags are immutable and cannot be deleted or moved."
            exit 1
          fi
          echo "✓ Tag does not exist"

      - name: Validate podspec
        run: |
          # Install CocoaPods
          gem install cocoapods

          # Use lib lint (not spec lint) because tag doesn't exist yet
          # lib lint validates against local working tree
          pod lib lint Mixpanel-swift.podspec --allow-warnings

      # Validate Carthage compatibility before creating the release tag.
      # This ensures the XCFramework builds successfully for Carthage users.
      # Carthage users rely on the framework being buildable from the tagged commit,
      # so we verify it works before proceeding with tag creation.
      # The build uses carthage.sh which creates XCFramework for all supported platforms.
      - name: Install Carthage
        run: brew install carthage

      - name: Build Carthage XCFramework
        run: |
          ./scripts/carthage.sh

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create annotated tag (no 'v' prefix)
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"

          # Push tag to origin
          git push origin "${{ inputs.version }}"

      - name: Extract changelog for this version
        id: extract_changelog
        run: |
          VERSION="${{ inputs.version }}"

          if [ ! -f "CHANGELOG.md" ]; then
            echo "⚠️  CHANGELOG.md not found, will use auto-generated notes"
            echo "CHANGELOG_FOUND=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract this version's changelog entry
          # Starts with "## [VERSION](...)" and ends before next "## [" or EOF
          # The changelog format includes a link after the version number
          # Uses state-based matching to avoid range pattern issues
          CHANGELOG=$(awk -v ver="$VERSION" '
          /^## \[/ {
            if (match($0, "^## \\[" ver "\\]\\(")) {
              inSection = 1
              print
              next
            }
            if (inSection) {
              exit
            }
          }
          inSection { print }
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG" ]; then
            echo "⚠️  Changelog entry for version $VERSION not found in CHANGELOG.md"
            echo "CHANGELOG_FOUND=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Save to temp file for gh release create
          echo "$CHANGELOG" > /tmp/release-notes.md

          echo "CHANGELOG_FOUND=true" >> $GITHUB_OUTPUT
          echo "✓ Extracted changelog entry for $VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating GitHub Release draft..."

          if [ "${{ steps.extract_changelog.outputs.CHANGELOG_FOUND }}" = "true" ]; then
            # Use curated changelog from CHANGELOG.md
            gh release create "${{ inputs.version }}" \
              --title "Release ${{ inputs.version }}" \
              --notes-file /tmp/release-notes.md \
              --draft
            echo "✓ GitHub Release created with changelog from CHANGELOG.md"
          else
            # Fallback to auto-generated notes
            gh release create "${{ inputs.version }}" \
              --title "Release ${{ inputs.version }}" \
              --generate-notes \
              --draft
            echo "✓ GitHub Release created with auto-generated notes"
          fi

      - name: SPM release complete
        run: |
          echo "✅ Tag ${{ inputs.version }} created successfully!"
          echo "✅ GitHub Release created as draft (enables SPM distribution)"
          echo ""
          echo "Swift Package Manager users can now use version ${{ inputs.version }}"
          echo ""
          echo "Next step: Run the 'Release CocoaPod' workflow"
          echo "  1. Go to: https://github.com/${{ github.repository }}/actions/workflows/release-cocoapod.yml"
          echo "  2. Click 'Run workflow'"
          echo "  3. Enter version: ${{ inputs.version }}"
          echo "  4. Approve the 'production' environment when prompted"
          echo ""
          echo "After CocoaPod publishing completes:"
          echo "  - Manually publish the draft GitHub Release at: https://github.com/${{ github.repository }}/releases"
